services:
  bale-notifier:
    build: .
    container_name: bale-notifier
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Per-user noVNC ports (6081 = first user, 6082 = second, etc.)
    ports:
      - "6081-6090:6081-6090"
    volumes:
      - ./data:/data
    environment:
      - DISPLAY=:99
      - DATA_DIR=/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/main.js"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3