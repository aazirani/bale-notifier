x-bale-notifier: &bale-notifier
  build: .
  stdin_open: true
  tty: true
  restart: unless-stopped
  environment:
    - DISPLAY=:99

services:
  # Copy and customize this block for each user.
  # Each user gets: unique container name, unique host ports, unique data volume.
  user1:
    <<: *bale-notifier
    container_name: bale-user1
    ports:
      - "6081:6081"
    volumes:
      - ./data/user1:/data
    environment:
      - DISPLAY=:99
      - NOVNC_PORT=6081
      - VNC_PORT=5901

