services:
  bale-notifier:
    build: .
    container_name: bale-notifier
    stdin_open: true
    tty: true
    restart: unless-stopped
    # 6080 = wizard (add-user), 6081-6090 = per-user orchestrator
    ports:
      - "6080:6080"
      - "6081-6090:6081-6090"
    volumes:
      - ./data:/data
    environment:
      - DISPLAY=:99
      - DATA_DIR=/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/main.js"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3